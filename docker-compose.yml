services:
  mariadb:
    image: mariadb:10.11
    container_name: wcdo_rh_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: wcdo_rh
      MARIADB_USER: wcdo
      MARIADB_PASSWORD: wcdo
    ports:
      - "3309:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - wcdo_rh_net

  phpmyadmin:
    image: phpmyadmin:5
    container_name: wcdo_rh_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8091:80"
    depends_on:
      - mariadb
    networks:
      - wcdo_rh_net

  symfony-php:
    build:
      context: ./docker/symfony
      dockerfile: Dockerfile
    container_name: wcdo_rh_php
    restart: unless-stopped
    working_dir: /var/www/symfony
    user: "1000:1000"
    volumes:
      - ./symfony:/var/www/symfony
    environment:
      DATABASE_URL: "mysql://wcdo:wcdo@mariadb:3306/wcdo_rh?serverVersion=10.11.0-MariaDB&charset=utf8mb4"
      APP_ENV: dev
    depends_on:
      - mariadb
    networks:
      - wcdo_rh_net

  symfony-nginx:
    image: nginx:1.27-alpine
    container_name: wcdo_rh_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./symfony:/var/www/symfony:ro
      - ./docker/symfony/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - symfony-php
    networks:
      - wcdo_rh_net

volumes:
  mariadb_data:

networks:
  wcdo_rh_net:
    driver: bridge
